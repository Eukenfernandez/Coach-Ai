<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CoachAI</title>
    <meta
      name="description"
      content="CoachAI es una app de entrenamiento con IA para analizar vídeos, mejorar técnica, registrar marcas personales y seguir progreso deportivo."
    />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="theme-color" content="#ea580c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoachAI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
  </head>
  <body class="bg-gray-100 text-neutral-900 dark:bg-neutral-950 dark:text-white min-h-[100dvh] w-full transition-colors duration-300">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ("serviceWorker" in navigator && (window.location.protocol === "http:" || window.location.protocol === "https:")) {
        var isLocalHost = ["localhost", "127.0.0.1", "::1"].indexOf(window.location.hostname) !== -1;
        window.addEventListener("load", function () {
          if (isLocalHost) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
              registrations.forEach(function (registration) { registration.unregister(); });
            }).catch(function () {});
            if ("caches" in window) {
              caches.keys().then(function (keys) {
                keys.filter(function (key) { return key.indexOf("coach-ai") === 0; }).forEach(function (key) { caches.delete(key); });
              }).catch(function () {});
            }
            return;
          }
          navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
